version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - revive
    - unconvert
  exclusions:
    rules:
      # Test code may use weak randomness, hardcoded creds, and unchecked errors.
      - path: _test\.go
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Hitesh-s0lanki/go-ecommerce

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
