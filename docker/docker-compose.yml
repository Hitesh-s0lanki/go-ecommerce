services:
  postgres:
    image: postgres:18.4-alpine
    container_name: go_ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-ecommerce_shop}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # Postgres 18 moved PGDATA to /var/lib/postgresql/<major>/docker and the
      # image now expects the volume one level up, at /var/lib/postgresql.
      # Mounting /var/lib/postgresql/data (correct for 17 and earlier) does not
      # persist data on 18.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ecommerce_shop}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  localstack:
    # Pinned to a community release. The previous 2026.06.3 pin is a licensed
    # build: it demands a LOCALSTACK_AUTH_TOKEN and exits 55 without one, so
    # the container only ever restart-looped.
    image: localstack/localstack:4.0
    container_name: go_ecommerce_localstack
    restart: unless-stopped
    environment:
      - SERVICES=s3,sqs
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
    ports:
      - "4566:4566" # LocalStack gateway (all services)
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      # Runs once the gateway is up, to create the uploads bucket. Without it
      # every upload fails with NoSuchBucket on a fresh volume.
      - ./init/aws/init-localstack.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Stands in for the CDN that would front uploaded files in production, so a
  # local run exercises the same shape: the API hands out URLs to something
  # other than itself. Serves both upload providers from one URL — see
  # nginx/nginx.conf. Only used when UPLOAD_PUBLIC_BASE_URL points at it.
  cdn:
    image: nginx:1.27-alpine
    container_name: go_ecommerce_cdn
    restart: unless-stopped
    ports:
      - "${CDN_PORT:-8081}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/upload-headers.inc:/etc/nginx/conf.d/upload-headers.inc:ro
      # Read-only: this serves the local provider's files, it never writes them.
      # The API creates the directory; the mount would otherwise be a
      # root-owned empty one.
      - ../uploads:/var/www/uploads:ro
    depends_on:
      - localstack
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/uploads/ || true"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
  localstack_data:
