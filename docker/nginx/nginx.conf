# A stand-in for the CDN that would sit in front of uploaded files in
# production, so development exercises the same shape: the API stores a URL
# pointing here, and something other than the API serves the bytes.
#
# One URL serves both upload providers. A request for /uploads/<key> is served
# from disk if the local provider wrote it there, and proxied to the S3 bucket
# otherwise. That means UPLOAD_PUBLIC_BASE_URL can stay put while
# UPLOAD_PROVIDER changes underneath it.
#
# Development only. It fronts a bucket that init-localstack.sh makes
# world-readable, and it terminates no TLS.

events {}

http {
    # Types the local files by extension. Uploads are stored under an extension
    # derived from their sniffed content, so the two agree.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;

        # No directory listing: /uploads/products/ must not enumerate the shop.
        autoindex off;

        location /uploads/ {
            root /var/www;

            # Local first, then the bucket. try_files is what lets one URL
            # serve either provider.
            try_files $uri @s3;

            include /etc/nginx/conf.d/upload-headers.inc;
        }

        location @s3 {
            # /uploads/products/1/x.png -> /ecommerce-uploads/products/1/x.png
            #
            # The bucket name is fixed here. It must match AWS_S3_BUCKET; nginx
            # cannot read the environment without templating the whole config.
            rewrite ^/uploads/(.*)$ /ecommerce-uploads/$1 break;

            proxy_pass http://localstack:4566;
            proxy_set_header Host $host;

            # S3 objects carry the Content-Type the upload service detected, so
            # unlike the reference this passes it through rather than guessing
            # from the extension: the object is the authority on what it is.
            include /etc/nginx/conf.d/upload-headers.inc;
        }
    }
}
