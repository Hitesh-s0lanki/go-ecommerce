  /orders:
    get:
      description: Returns a page of your own orders, newest first.
      parameters:
      - default: 1
        description: Page number, from 1
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size, up to 100
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: A page of orders
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.OrderListEnvelope'
        "400":
          description: Invalid page or limit
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "401":
          description: Missing or invalid access token
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: List your orders
      tags:
      - orders
    post:
      description: 'Turns your cart into an order: stock comes down, the prices you
        pay are recorded on the order, and the cart is emptied. All of it happens
        together or not at all. Fails if any line is out of stock or no longer on
        sale.'
      produces:
      - application/json
      responses:
        "201":
          description: The placed order
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.OrderEnvelope'
        "400":
          description: The cart is empty, or a product is no longer on sale
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "401":
          description: Missing or invalid access token
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "404":
          description: A product in the cart no longer exists
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "409":
          description: Not enough stock for one of the lines
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Place an order
      tags:
      - orders
  /orders/{id}:
    get:
      description: Returns an order you placed. Someone else's order id reads as not
        found.
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
