basePath: /api/v1
definitions:
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.AddToCartRequest:
    properties:
      product_id:
        type: integer
      quantity:
        minimum: 1
        type: integer
    required:
    - product_id
    - quantity
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.AuthEnvelope:
    properties:
      data:
        $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.AuthResponse'
      message:
        example: logged in
        type: string
      success:
        example: true
        type: boolean
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.AuthResponse:
    properties:
      access_token:
        type: string
      expires_in:
        description: |-
          ExpiresIn is the access token's lifetime in seconds, so a client need
          not decode the token to schedule a refresh.
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.UserResponse'
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CartEnvelope:
    properties:
      data:
        $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CartResponse'
      message:
        example: ok
        type: string
      success:
        example: true
        type: boolean
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CartItemResponse:
    properties:
      id:
        type: integer
      product:
        $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ProductResponse'
      quantity:
        type: integer
      subtotal_cents:
        type: integer
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CartResponse:
    properties:
      cart_items:
        items:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CartItemResponse'
        type: array
      id:
        type: integer
      item_count:
        type: integer
      last_updated:
        type: string
      total_cents:
        type: integer
      user_id:
        type: integer
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CategoryEnvelope:
    properties:
      data:
        $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CategoryResponse'
      message:
        example: ok
        type: string
      success:
        example: true
        type: boolean
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CategoryListEnvelope:
    properties:
      data:
        items:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CategoryResponse'
        type: array
      message:
        example: ok
        type: string
      success:
        example: true
        type: boolean
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CategoryResponse:
    properties:
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CreateCategoryRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      name:
        maxLength: 255
        type: string
    required:
    - name
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CreateProductRequest:
    properties:
      category_id:
        type: integer
      description:
        maxLength: 5000
        type: string
      name:
        maxLength: 255
        type: string
      price_cents:
        type: integer
      sku:
        maxLength: 100
        type: string
      stock:
        minimum: 0
        type: integer
    required:
    - category_id
    - name
    - price_cents
    - sku
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope:
    properties:
      error:
        example: email is not available
        type: string
      message:
        example: invalid credentials
        type: string
      success:
        example: false
        type: boolean
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.MessageEnvelope:
    properties:
      message:
        example: logged out
        type: string
      success:
        example: true
        type: boolean
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.OrderEnvelope:
    properties:
      data:
        $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.OrderResponse'
      message:
        example: order placed
        type: string
      success:
        example: true
        type: boolean
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.OrderItemResponse:
    properties:
      id:
        type: integer
      product:
        $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ProductResponse'
      quantity:
        description: Quantity and the price paid at the time of purchase.
        type: integer
      subtotal_cents:
        type: integer
      unit_price_cents:
        type: integer
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.OrderListEnvelope:
    properties:
      data:
        items:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.OrderResponse'
        type: array
      message:
        example: ok
        type: string
      meta:
        $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.PageMeta'
      success:
        example: true
        type: boolean
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.OrderResponse:
    properties:
      created_at:
        description: |-
          A real timestamp, not a preformatted string: clients localise it
          themselves, and encoding/json already emits RFC 3339.
        type: string
      id:
        type: integer
      order_items:
        items:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.OrderItemResponse'
        type: array
      status:
        type: string
      total_amount_cents:
        description: Minor units, matching the model.
        type: integer
      user_id:
        type: integer
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.PageMeta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ProductEnvelope:
    properties:
      data:
        $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ProductResponse'
      message:
        example: ok
        type: string
      success:
        example: true
        type: boolean
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ProductImageEnvelope:
    properties:
      data:
        $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ProductImageResponse'
      message:
        example: image uploaded
        type: string
      success:
        example: true
        type: boolean
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ProductImageResponse:
    properties:
      alt_text:
        type: string
      id:
        type: integer
      is_primary:
        type: boolean
      url:
        type: string
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ProductListEnvelope:
    properties:
      data:
        items:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ProductResponse'
        type: array
      message:
        example: ok
        type: string
      meta:
        $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.PageMeta'
      success:
        example: true
        type: boolean
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ProductResponse:
    properties:
      category:
        allOf:
        - $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CategoryResponse'
        description: |-
          Pointer and omitempty: an unloaded relation is absent rather than an
          object full of zero values that a client cannot tell from real data.
      category_id:
        type: integer
      description:
        type: string
      id:
        type: integer
      images:
        items:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ProductImageResponse'
        type: array
      is_active:
        type: boolean
      name:
        type: string
      price_cents:
        type: integer
      sku:
        type: string
      stock:
        type: integer
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        maxLength: 100
        type: string
      last_name:
        maxLength: 100
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      phone:
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.UpdateCartItemRequest:
    properties:
      quantity:
        minimum: 1
        type: integer
    required:
    - quantity
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.UpdateCategoryRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      is_active:
        description: |-
          A pointer so an omitted field is distinguishable from false: without
          it, every update would silently deactivate the category.
        type: boolean
      name:
        maxLength: 255
        type: string
    required:
    - name
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.UpdateProductRequest:
    properties:
      category_id:
        type: integer
      description:
        maxLength: 5000
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 255
        type: string
      price_cents:
        type: integer
      stock:
        minimum: 0
        type: integer
    required:
    - category_id
    - name
    - price_cents
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.UpdateProfileRequest:
    properties:
      first_name:
        maxLength: 100
        type: string
      last_name:
        maxLength: 100
        type: string
      phone:
        type: string
    required:
    - first_name
    - last_name
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.UserEnvelope:
    properties:
      data:
        $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.UserResponse'
      message:
        example: ok
        type: string
      success:
        example: true
        type: boolean
    type: object
  github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.UserResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_name:
        type: string
      phone:
        type: string
      role:
        type: string
    type: object
info:
  contact: {}
  description: 'E-commerce backend. Money is always in minor units: a price_cents
    of 1999 means $19.99.'
  title: go-ecommerce API
  version: 0.1.0
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Exchanges email and password for an access/refresh token pair.
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logged in
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.AuthEnvelope'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      summary: Log in
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes a refresh token. Succeeds even if the token is already
        gone, since the caller's intent is satisfied either way.
      parameters:
      - description: Refresh token to revoke
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logged out
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.MessageEnvelope'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      summary: Log out
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the authenticated user. Identical to /users/profile.
      produces:
      - application/json
      responses:
        "200":
          description: The current user
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.UserEnvelope'
        "401":
          description: Missing or invalid access token
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "404":
          description: Account no longer exists or is deactivated
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Current account
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a refresh token for a new pair. The presented token is
        revoked, so each refresh token works once. Replaying a used token revokes
        every session for that user.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New token pair
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.AuthEnvelope'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "401":
          description: Invalid, expired, or already-used refresh token
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      summary: Refresh tokens
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a customer account and returns an initial token pair. The
        role is always "customer"; it cannot be set by the caller.
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Account created
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.AuthEnvelope'
        "400":
          description: Validation failed, or the email is unavailable
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      summary: Register a new account
      tags:
      - auth
  /cart:
    get:
      description: Returns the authenticated user's cart, priced from the products'
        current prices. A user who has never had a cart gets an empty one rather than
        a 404.
      produces:
      - application/json
      responses:
        "200":
          description: The cart
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CartEnvelope'
        "401":
          description: Missing or invalid access token
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "404":
          description: Account no longer exists
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Get your cart
      tags:
      - cart
  /cart/items:
    post:
      consumes:
      - application/json
      description: Adds a product, or increases the quantity already in the cart.
        The cart is not a reservation — stock is only held once the order is placed
        — but a quantity beyond what is in stock is refused here rather than at checkout.
      parameters:
      - description: Product and quantity
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.AddToCartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: The updated cart
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CartEnvelope'
        "400":
          description: Validation failed, or the product is not on sale
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "401":
          description: Missing or invalid access token
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "404":
          description: No such product
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "409":
          description: Not enough stock
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Add an item to your cart
      tags:
      - cart
  /cart/items/{id}:
    delete:
      parameters:
      - description: Cart item ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Item removed
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.MessageEnvelope'
        "400":
          description: The id is not a number
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "401":
          description: Missing or invalid access token
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "404":
          description: No such item in your cart
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Remove an item from your cart
      tags:
      - cart
    put:
      consumes:
      - application/json
      description: Replaces the quantity of one line. To remove it, use DELETE — a
        quantity of zero is refused.
      parameters:
      - description: Cart item ID
        in: path
        name: id
        required: true
        type: integer
      - description: New quantity
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.UpdateCartItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: The updated cart
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CartEnvelope'
        "400":
          description: Validation failed, or the product is not on sale
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "401":
          description: Missing or invalid access token
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "404":
          description: No such item in your cart
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "409":
          description: Not enough stock
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Set the quantity of a cart item
      tags:
      - cart
  /categories:
    get:
      description: Public. Returns the active categories, ordered by name.
      produces:
      - application/json
      responses:
        "200":
          description: Categories
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CategoryListEnvelope'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      summary: List categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Admin only. The category is created active.
      parameters:
      - description: Category details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Category created
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.CategoryEnvelope'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "401":
          description: Missing or invalid access token
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
        "403":
          description: Not an administrator
          schema:
            $ref: '#/definitions/github_com_Hitesh-s0lanki_go-ecommerce_internal_dto.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Create a category
      tags:
      - categories
  /categories/{id}:
    delete:
      description: Admin only. A category that still has products is refused; deactivate
        it instead, or move the products first.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Category deleted
          schema:
